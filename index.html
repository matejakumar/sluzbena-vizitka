<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mateja Kumar - Digitalna Vizitka</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Prvi podnapis: odebeljen (bold) */
.subtitle {
    font-weight: bold;
    font-size: 16px; /* Po želji prilagodi velikost */
    margin-bottom: 5px; /* Malo razmika pred naslednjo vrstico */
}

/* Drugi podnapis: manjši in navaden (ne bold) */
.sub-subtitle {
    font-weight: normal; /* To poskrbi, da ni bold */
    font-size: 14px;    /* Manjša pisava */
    color: #555555;     /* Po želji: malo svetlejša siva barva, da se še bolj razlikuje */
    margin-bottom: 15px;
}
        /* Stil za video ozadje */
        #video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -100;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Rešitev, če se video ne naloži */
        }
        /* Temna plast čez video za boljšo berljivost */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0); /* Številka 0.3 določa zatemnitev videa */
            z-index: -99;
        }
        /* Kartica vizitke */
        .card {
            background: rgba(255, 255, 255, 0.3); /* Rahlo prosojno belo ozadje kartice */
            backdrop-filter: blur(10px); /* Učinek zamegljenega stekla za kartico */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 350px;
            width: 90%;
            z-index: 1;
            max-height: 95vh;
            overflow-y: auto;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0077b5;
        }
        h1 { margin: 15px 0 5px 0; font-size: 24px; color: #222; }
        .subtitle { color: #555; font-size: 16px; margin-bottom: 20px; font-weight: 500; }
        .links { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            display: block;
            padding: 12px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .qr-section { margin-top: 25px; border-top: 1px solid #ddd; padding-top: 20px; }
        .qr-section p { font-size: 12px; color: #557; margin-bottom: 5px; }
         /* Glavni vsebnik, ki prisili elemente v navpično vrsto (stolpec) */
.bottom-section-stack {
    display: flex;
    flex-direction: column; /* Vse zloži navpično */
    align-items: center;    /* Centriranje levo-desno */
    width: 100%;
    margin-top: 30px;       /* Razmik od zgornjega dela vizitke (od službe za trženje) */
}

/* Vsebnik za ikone - te morajo ostati vodoravno */
.social-container {
    display: flex;
    gap: 20px;              /* Razmik med ikonami */
    margin-bottom: 15px;    /* Razmik do črte */
}

/* Osnovni stil za ikone (krogci) */
.social-icon {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    color: white;
    text-decoration: none;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: transform 0.2s ease;
}

.social-icon:hover {
    transform: scale(1.1);
}

/* Barve ikon */
.linkedin { background-color: #0077B5; }
.facebook { background-color: #1877F2; }
.email { background-color: #EA4335; }

.social-icon svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
}

/* Delilna črta (Divider) */
.divider-line {
    width: 80%;             /* Črta ne gre čisto do roba, kar izgleda bolj elegantno */
    border: 0;
    height: 1px;
    background-color: #e0e0e0; /* Nežna siva barva */
    margin: 15px 0;
}

/* Tekst nad QR kodo */
.qr-text {
    font-family: Arial, sans-serif;
    font-size: 14px;
    color: #333333;
    margin: 0 0 10px 0;    /* Majhen razmik le navzdol proti QR kodi */
    text-align: center;
}

/* QR koda */
.qr-code {
    width: 140px;           /* Prilagodi velikost QR kode po želji */
    height: auto;
    display: block;
}
       
    </style>
</head>
<body>

<video autoplay loop muted playsinline id="video-background">
    <source src="background_video.mp4" type="video/mp4">
    Vaš brskalnik ne podpira video značke.
</video>

<div class="overlay"></div>

<div class="card">
    <img src="Mateja Kumar slika.jpg" alt="Mateja Kumar" class="profile-img">
    
    <h1>Mateja Kumar</h1>
    <div class="subtitle">Univerzitetni rehabilitacijski inštitut Republike Slovenije Soča</div>
    <div class="sub-subtitle">Služba za trženje</div>
    <div class="bottom-section-stack">

    <div class="social-container">
        <a href="https://www.linkedin.com/in/mateja-kumar-1a1957225/" target="_blank" class="social-icon linkedin" title="LinkedIn">

        </a>
        <a href="https://www.facebook.com/mateja.kumar" target="_blank" class="social-icon facebook" title="Facebook">
            <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>

        <a href="mailto:mailto:mateja.kumar@ir-rs.si" class="social-icon email" title="E-mail">

        </a>
    </div>

    <hr class="divider-line">
   
    <div class="qr-container">
        <p>Skeniraj za shranjevanje stika</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://matejakumar.github.io/sluzbena-vizitka/" alt="QR Koda">
    </div>
</div>

</body>
</html>
